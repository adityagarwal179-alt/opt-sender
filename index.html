<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multi-Auth Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 10px; margin: 5px 0; border: none; border-radius: 5px; cursor: pointer; color: white; }
        .phone-btn { background: #4a90e2; }
        .google-btn { background: #db4437; }
        #recaptcha-container { margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Login</h2>
    
    <button class="google-btn" id="google-login">Sign in with Google</button>
    <hr>
    
    <div id="recaptcha-container"></div>
    <input type="tel" id="phone" placeholder="+91XXXXXXXXXX">
    <button class="phone-btn" id="send-otp">Send OTP</button>
    <input type="text" id="otp" placeholder="Enter OTP">
    <button class="phone-btn" id="verify-otp">Verify OTP</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDvwpPrqEvOM59FuLwbPF0Zo-o6xlftoJE",
        authDomain: "otp-login-test-baa19.firebaseapp.com",
        projectId: "otp-login-test-baa19",
        storageBucket: "otp-login-test-baa19.firebasestorage.app",
        messagingSenderId: "737023736893",
        appId: "1:737023736893:web:0c73126bcd596ebb61fe54"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 1. Google Auth Logic
    document.getElementById('google-login').addEventListener('click', () => {
        const provider = new GoogleAuthProvider();
        signInWithPopup(auth, provider)
            .then((result) => alert("Google Login Successful: " + result.user.email))
            .catch((err) => alert("Error: " + err.message));
    });

    // 2. Phone Auth Logic (Fixed)
    window.recaptchaVerifier = new RecaptchaVerifier(auth, document.getElementById('recaptcha-container'), { 'size': 'normal' });
    
    document.getElementById('send-otp').addEventListener('click', () => {
        const phone = document.getElementById('phone').value;
        signInWithPhoneNumber(auth, phone, window.recaptchaVerifier)
            .then((res) => {
                window.confirmationResult = res;
                alert("OTP Sent!");
            }).catch(err => alert("Error: " + err.message));
    });

    document.getElementById('verify-otp').addEventListener('click', () => {
        window.confirmationResult.confirm(document.getElementById('otp').value)
            .then(() => alert("Phone Login Successful!"))
            .catch(() => alert("Invalid OTP!"));
    });
</script>
</body>
</html>

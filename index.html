<!DOCTYPE html>
<html>
<body>
    <h2>Login with Phone Number</h2>
    <div id="recaptcha-container"></div>
    <input type="tel" id="phone" placeholder="+91XXXXXXXXXX">
    <button id="send-otp">Send OTP</button>

    <input type="text" id="otp" placeholder="Enter OTP">
    <button id="verify-otp">Verify</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";

// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDvwpPrqEvOM59FuLwbPF0Zo-o6xlftoJE",
  authDomain: "otp-login-test-baa19.firebaseapp.com",
  projectId: "otp-login-test-baa19",
  storageBucket: "otp-login-test-baa19.firebasestorage.app",
  messagingSenderId: "737023736893",
  appId: "1:737023736893:web:0c73126bcd596ebb61fe54",
  measurementId: "G-FM03NB0VN2"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth();

        // reCAPTCHA सेटअप (लाइव के लिए जरूरी)
        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'normal' });

        document.getElementById('send-otp').addEventListener('click', () => {
            const phoneNumber = document.getElementById('phone').value;
            signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier)
                .then((confirmationResult) => {
                    window.confirmationResult = confirmationResult;
                    alert("OTP भेजा गया!");
                }).catch((error) => console.log(error));
        });

        document.getElementById('verify-otp').addEventListener('click', () => {
            const code = document.getElementById('otp').value;
            window.confirmationResult.confirm(code).then((result) => {
                alert("सफलतापूर्वक लॉग इन हो गया!");
            }).catch((error) => alert("गलत OTP!"));
        });
    </script>
</body>
</html>
